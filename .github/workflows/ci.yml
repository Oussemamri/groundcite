# CI (spec §4.1, §17 rule 7). Gates every change on the core quality bar:
# ruff (lint + format), mypy --strict, import-linter (§4 dependency rule), pytest.
# The 12-case eval-smoke gate (spec §8) is added once the eval harness exists
# (Week 3).
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: core (lint · typecheck · import-linter · pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      # actions/checkout v5 is the current major.
      - uses: actions/checkout@v5

      # astral-sh/setup-uv v8 line (current major). v8.0.0 stopped publishing
      # moving major/minor tags for supply-chain security (immutable releases),
      # so we pin to a concrete immutable v8 release; bump explicitly on update.
      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Ruff (format)
        run: uv run ruff format --check .

      - name: mypy (strict)
        run: uv run mypy groundcite

      - name: import-linter (dependency rule)
        run: uv run lint-imports

      - name: pytest
        run: uv run pytest
