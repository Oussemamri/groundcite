# Alembic config for GroundCite (spec §5). The database URL is injected from
# groundcite.config (pydantic-settings) in migrations/env.py — do NOT hardcode it
# here (spec §17 rule 9).
[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
# sqlalchemy.url is set at runtime from DATABASE_URL via env.py.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
